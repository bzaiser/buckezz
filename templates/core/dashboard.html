{% extends 'base.html' %}

{% block content %}
<div class="dashboard-container" x-data="{ 
    showCreateModal: {% if request.GET.create %}true{% else %}false{% endif %}, 
    showTemplateHelp: false, 
    helpTemplateSlug: '',
    helpTemplates: {
        {% for cat in categories %}
            '{{ cat.slug }}': {
                'name': '{{ cat.name|escapejs }}',
                'icon': '{{ cat.icon|escapejs }}',
                'purpose': '{{ cat.template.help_purpose|escapejs }}',
                'fields': '{{ cat.template.help_fields|escapejs }}',
                'example': '{{ cat.template.help_example|escapejs }}'
            }{% if not forloop.last %},{% endif %}
        {% endfor %}
    }
}">
    <div class="header-section">
        <h1>Meine Buckets</h1>
        <button class="btn btn-primary" @click="showCreateModal = true">+ Neuer Bucket</button>
    </div>

    <div class="list-grid">
        {% for list in lists %}
            <a href="{% url 'core:list_detail' list.id %}" class="card glass bucket-card">
                <div class="card-content">
                    <h3>{{ list.title }}</h3>
                    <p class="text-muted">{{ list.category.name }}</p>
                    <div class="stats">
                        <span>{{ list.items.count }} Einträge</span>
                    </div>
                </div>
            </a>
        {% empty %}
            <div class="empty-state glass card">
                <p>Du hast noch keine Buckets erstellt.</p>
                <button class="btn btn-primary" @click="showCreateModal = true">Ersten Bucket anlegen</button>
            </div>
        {% endfor %}
    </div>

    <!-- Create Bucket Modal -->
    <template x-if="showCreateModal">
        <div class="modal-overlay" x-show="showCreateModal" style="display: none;">
            <div class="modal-content glass card">
                <h2>Neuen Bucket erstellen</h2>
                <form action="{% url 'core:list_create' %}" method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Name des Buckets</label>
                        <input type="text" name="title" placeholder="z.B. Wocheneinkauf" required class="glass">
                    </div>
                    
                    <div class="form-group">
                        <label style="display: flex; align-items: center; justify-content: space-between;">
                            <span>Vorlage auswählen</span>
                            <span class="text-muted" style="font-size: 0.75rem; font-weight: normal;">Klicke auf das ❓ einer Vorlage für Beispiele & Infos</span>
                        </label>
                        <div class="template-selector">
                            {% for cat in categories %}
                                <label class="template-option">
                                    <input type="radio" name="category_id" value="{{ cat.id }}" required>
                                    <div class="template-card glass" style="position: relative;">
                                        <!-- Help Button in Corner -->
                                        <button type="button" 
                                                @click.stop.prevent="helpTemplateSlug = '{{ cat.slug }}'; showTemplateHelp = true"
                                                class="glass" 
                                                style="position: absolute; top: 6px; right: 6px; border: none; background: rgba(255,255,255,0.08); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; cursor: pointer; color: var(--primary); transition: all 0.2s;"
                                                onmouseover="this.style.background='rgba(255,255,255,0.18)'"
                                                onmouseout="this.style.background='rgba(255,255,255,0.08)'"
                                                title="Vorlage-Anleitung anzeigen">
                                            ❓
                                        </button>
                                        <span class="template-icon">{{ cat.icon }}</span>
                                        <span class="template-name">{{ cat.name }}</span>
                                    </div>
                                </label>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn glass" @click="showCreateModal = false">Abbrechen</button>
                        <button type="submit" class="btn btn-primary">Erstellen</button>
                    </div>
                </form>
            </div>
        </div>
    </template>

    <!-- Help / Template Instructions Modal -->
    <template x-if="showTemplateHelp">
        <div class="modal-overlay" @click.self="showTemplateHelp = false" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2200; backdrop-filter: blur(10px);">
            <div class="modal-content glass card" style="width: 100%; max-width: 550px; padding: var(--spacing-lg); border: 1px solid var(--accent); max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; gap: var(--spacing-md); position: relative;">
                
                <!-- Close Button -->
                <button type="button" @click="showTemplateHelp = false" style="position: absolute; top: 16px; right: 16px; background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; line-height: 1;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">&times;</button>
                
                <!-- Dynamic Header and Content based on selected slug -->
                <template x-if="helpTemplates[helpTemplateSlug]">
                    <div>
                        <div style="display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; margin-bottom: var(--spacing-md);">
                            <span style="font-size: 2.2rem;" x-text="helpTemplates[helpTemplateSlug].icon"></span>
                            <div>
                                <h2 style="margin: 0; font-size: 1.3rem; color: var(--primary);">
                                    Vorlage: <span x-text="helpTemplates[helpTemplateSlug].name"></span>
                                </h2>
                                <p class="text-muted" style="margin: 2px 0 0 0; font-size: 0.82rem;">Eimer-Vorlage Details & Ausfüllhilfen</p>
                            </div>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 14px; line-height: 1.5; font-size: 0.92rem;">
                            <!-- Purpose -->
                            <p>
                                <strong>💡 Zweck:</strong> 
                                <span x-text="helpTemplates[helpTemplateSlug].purpose || 'Einträge übersichtlich erfassen und verwalten.'"></span>
                            </p>
                            
                            <!-- Fields -->
                            <template x-if="helpTemplates[helpTemplateSlug].fields">
                                <div>
                                    <strong>🛠️ Erstellung & Felder:</strong>
                                    <div style="white-space: pre-line; margin-top: 4px;" x-text="helpTemplates[helpTemplateSlug].fields"></div>
                                </div>
                            </template>
                            
                            <!-- Example -->
                            <template x-if="helpTemplates[helpTemplateSlug].example">
                                <div style="background: rgba(255,255,255,0.02); padding: 12px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.05); margin-top: 8px;">
                                    <strong style="color: var(--primary);">📝 Praxis-Beispiel:</strong><br>
                                    <span style="font-style: italic; white-space: pre-line;" x-text="helpTemplates[helpTemplateSlug].example"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <div style="margin-top: var(--spacing-md); display: flex; justify-content: flex-end;">
                    <button type="button" class="btn btn-primary" @click="showTemplateHelp = false" style="min-width: 100px;">Verstanden</button>
                </div>
            </div>
        </div>
    </template>
</div>

<style>
    .header-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--spacing-lg);
    }
    .list-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: var(--spacing-md);
    }
    .bucket-card {
        text-decoration: none;
        transition: transform 0.2s;
    }
    .bucket-card:hover {
        transform: translateY(-5px);
        border-color: var(--primary);
    }
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
    }
    .modal-content {
        width: 100%;
        max-width: 500px;
        padding: var(--spacing-lg);
    }
    .template-selector {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: var(--spacing-sm);
        margin-top: var(--spacing-sm);
    }
    .template-option input { display: none; }
    .template-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: var(--spacing-sm);
        cursor: pointer;
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-md);
        min-height: 120px; /* Erhöht für bessere Lesbarkeit */
        text-align: center;
        transition: all 0.2s;
    }
    .template-icon {
        font-size: 1.8rem;
        margin-bottom: 4px;
    }
    .template-name {
        font-size: 0.75rem;
        font-weight: 500;
        line-height: 1.2;
    }
    .template-option input:checked + .template-card {
        border-color: var(--primary);
        background: color-mix(in srgb, var(--primary) 20%, transparent);
        transform: scale(1.05);
        box-shadow: 0 0 15px color-mix(in srgb, var(--primary) 30%, transparent);
    }
    .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: var(--spacing-md);
        margin-top: var(--spacing-lg);
    }
    
    @media (max-width: 768px) {
        .header-section {
            flex-direction: column;
            align-items: stretch;
            gap: var(--spacing-md);
        }
        .header-section > div {
            text-align: center;
        }
        .header-section button {
            width: 100%;
        }
        .list-grid {
            grid-template-columns: 1fr;
        }
        .modal-content {
            padding: var(--spacing-md);
            margin: var(--spacing-md);
            width: auto;
        }
    }
</style>
{% endblock %}
