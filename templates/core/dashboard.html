{% extends 'base.html' %}

{% block content %}
<div class="dashboard-container" x-data="{ showCreateModal: {% if request.GET.create %}true{% else %}false{% endif %} }">
    <div class="header-section">
        <h1>Meine Buckets</h1>
        <button class="btn btn-primary" @click="showCreateModal = true">+ Neuer Bucket</button>
    </div>

    <div class="list-grid">
        {% for list in lists %}
            <a href="{% url 'core:list_detail' list.id %}" class="card glass bucket-card">
                <div class="card-content">
                    <h3>{{ list.title }}</h3>
                    <p class="text-muted">{{ list.category.name }}</p>
                    <div class="stats">
                        <span>{{ list.items.count }} Einträge</span>
                    </div>
                </div>
            </a>
        {% empty %}
            <div class="empty-state glass card">
                <p>Du hast noch keine Buckets erstellt.</p>
                <button class="btn btn-primary" @click="showCreateModal = true">Ersten Bucket anlegen</button>
            </div>
        {% endfor %}
    </div>

    <!-- Create Bucket Modal -->
    <template x-if="showCreateModal">
        <div class="modal-overlay" @click.self="showCreateModal = false">
            <div class="modal-content glass card">
                <h2>Neuen Bucket erstellen</h2>
                <form action="{% url 'core:list_create' %}" method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Name des Buckets</label>
                        <input type="text" name="title" placeholder="z.B. Wocheneinkauf" required class="glass">
                    </div>
                    
                    <div class="form-group">
                        <label>Vorlage auswählen</label>
                        <div class="template-selector">
                            {% for cat in categories %}
                                <label class="template-option">
                                    <input type="radio" name="category_id" value="{{ cat.id }}" required>
                                    <div class="template-card glass">
                                        <span class="template-icon">{{ cat.icon }}</span>
                                        <span class="template-name">{{ cat.name }}</span>
                                    </div>
                                </label>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn glass" @click="showCreateModal = false">Abbrechen</button>
                        <button type="submit" class="btn btn-primary">Erstellen</button>
                    </div>
                </form>
            </div>
        </div>
    </template>
</div>

<style>
    .header-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--spacing-lg);
    }
    .list-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: var(--spacing-md);
    }
    .bucket-card {
        text-decoration: none;
        transition: transform 0.2s;
    }
    .bucket-card:hover {
        transform: translateY(-5px);
        border-color: var(--primary);
    }
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
    }
    .modal-content {
        width: 100%;
        max-width: 500px;
        padding: var(--spacing-lg);
    }
    .template-selector {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: var(--spacing-sm);
        margin-top: var(--spacing-sm);
    }
    .template-option input { display: none; }
    .template-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: var(--spacing-sm);
        cursor: pointer;
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-md);
        min-height: 120px; /* Erhöht für bessere Lesbarkeit */
        text-align: center;
        transition: all 0.2s;
    }
    .template-icon {
        font-size: 1.8rem;
        margin-bottom: 4px;
    }
    .template-name {
        font-size: 0.75rem;
        font-weight: 500;
        line-height: 1.2;
    }
    .template-option input:checked + .template-card {
        border-color: var(--primary);
        background: color-mix(in srgb, var(--primary) 20%, transparent);
        transform: scale(1.05);
        box-shadow: 0 0 15px color-mix(in srgb, var(--primary) 30%, transparent);
    }
    .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: var(--spacing-md);
        margin-top: var(--spacing-lg);
    }
    
    @media (max-width: 768px) {
        .header-section {
            flex-direction: column;
            align-items: stretch;
            gap: var(--spacing-md);
        }
        .header-section > div {
            text-align: center;
        }
        .header-section button {
            width: 100%;
        }
        .list-grid {
            grid-template-columns: 1fr;
        }
        .modal-content {
            padding: var(--spacing-md);
            margin: var(--spacing-md);
            width: auto;
        }
    }
</style>
{% endblock %}
