{% extends 'base.html' %}

{% block content %}
<div class="dashboard-container" x-data="{ 
    showCreateModal: {% if request.GET.create %}true{% else %}false{% endif %}, 
    showTemplateHelp: false, 
    showHelpModal: false, 
    helpTemplateSlug: '',
    searchQuery: '',
    sortBy: 'last_used',
    lists: [
        {% for list in lists %}
            {
                id: '{{ list.id }}',
                title: '{{ list.title|escapejs }}',
                category: '{{ list.category.name|escapejs }}',
                itemsCount: {{ list.items.count }},
                updatedAt: {{ list.updated_at|date:'U' }},
                url: '{% url 'core:list_detail' list.id %}'
            }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ],
    get filteredLists() {
        let result = this.lists.filter(list => {
            return this.searchQuery === '' || 
                   list.title.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                   list.category.toLowerCase().includes(this.searchQuery.toLowerCase());
        });
        
        if (this.sortBy === 'last_used') {
            result.sort((a, b) => b.updatedAt - a.updatedAt);
        } else if (this.sortBy === 'alphabetical') {
            result.sort((a, b) => a.title.localeCompare(b.title));
        }
        return result;
    },
    helpTemplates: {
        {% for cat in categories %}
            '{{ cat.slug }}': {
                'name': '{{ cat.name|escapejs }}',
                'icon': '{{ cat.icon|escapejs }}',
                'purpose': '{{ cat.template.help_purpose|escapejs }}',
                'fields': '{{ cat.template.help_fields|escapejs }}',
                'example': '{{ cat.template.help_example|escapejs }}'
            }{% if not forloop.last %},{% endif %}
        {% endfor %}
    }
}">
    <!-- Navigation / Breadcrumb Row -->
    <nav class="list-breadcrumb" style="display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; margin-bottom: var(--spacing-md);">
        <div style="font-size: 0.88rem; display: flex; align-items: center; gap: 4px;">
            <a href="{% url 'core:home' %}" class="text-muted" style="text-decoration: none; font-weight: 500;">Start</a>
            <span class="text-muted" style="opacity: 0.5;">&gt;</span>
            <span class="text-muted" style="font-weight: 500;">Dashboard</span>
        </div>
        
        <div style="display: inline-flex; align-items: center; gap: 6px;">
            <!-- History Back Button -->
            <button onclick="window.history.back()" class="glass" style="border: none; background: rgba(255,255,255,0.05); width: 32px; height: 32px; border-radius: var(--radius-sm); cursor: pointer; color: var(--primary); display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'" title="Zurück">
                ⬅️
            </button>
            
            <!-- Sync Button -->
            <button onclick="window.location.reload()" class="glass" style="border: none; background: rgba(255,255,255,0.05); width: 32px; height: 32px; border-radius: var(--radius-sm); cursor: pointer; color: var(--primary); display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'" title="Aktualisieren">
                🔄
            </button>
            
            <!-- Help Button (❓ only) -->
            <button @click="showHelpModal = true" class="glass" style="border: none; background: rgba(255,255,255,0.05); width: 32px; height: 32px; border-radius: var(--radius-sm); cursor: pointer; color: var(--primary); display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'" title="Dashboard-Hilfe anzeigen">
                ❓
            </button>
        </div>
    </nav>

    <div class="header-section">
        <h1>Meine Buckets</h1>
        <button class="btn btn-primary" @click="showCreateModal = true">+ Neuer Bucket</button>
    </div>

    <!-- Search and Sort Toolbar -->
    {% if lists %}
    <div class="toolbar-row glass" style="display: flex; gap: var(--spacing-md); align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: var(--radius-md); margin-bottom: var(--spacing-lg); border: 1px solid var(--glass-border); flex-wrap: wrap; width: 100%;">
        <!-- Search input field -->
        <div class="search-container" style="position: relative; flex: 1; min-width: 240px;">
            <span style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.6; font-size: 0.95rem;">🔍</span>
            <input type="text" 
                   x-model="searchQuery" 
                   placeholder="Buckets nach Name oder Vorlage durchsuchen..." 
                   class="glass" 
                   style="width: 100%; padding: 8px 12px 8px 36px; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); color: var(--text-color); font-size: 0.9rem; outline: none; transition: border-color 0.2s;"
                   onfocus="this.style.borderColor='var(--primary)'"
                   onblur="this.style.borderColor='var(--glass-border)'">
            <button x-show="searchQuery !== ''" 
                    @click="searchQuery = ''" 
                    style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; line-height: 1;"
                    onmouseover="this.style.color='var(--primary)'"
                    onmouseout="this.style.color='var(--text-muted)'">
                &times;
            </button>
        </div>
        
        <!-- Sorting dropdown switcher -->
        <div class="sort-container" style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem;">
            <span class="text-muted" style="font-weight: 500;">Sortierung:</span>
            <select x-model="sortBy" 
                    class="glass" 
                    style="padding: 7px 12px; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: var(--text-color); font-size: 0.9rem; outline: none; cursor: pointer; transition: border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--primary)'"
                    onblur="this.style.borderColor='var(--glass-border)'">
                <option value="last_used">🕒 Zuletzt benutzt</option>
                <option value="alphabetical">🔤 Alphabetisch</option>
            </select>
        </div>
    </div>
    {% endif %}

    <div class="list-grid">
        {% if not lists %}
            <div class="empty-state glass card">
                <p>Du hast noch keine Buckets erstellt.</p>
                <button class="btn btn-primary" @click="showCreateModal = true">Ersten Bucket anlegen</button>
            </div>
        {% else %}
            <!-- Alpine.js List Grid -->
            <template x-for="list in filteredLists" :key="list.id">
                <a :href="list.url" class="card glass bucket-card">
                    <div class="card-content">
                        <h3 x-text="list.title"></h3>
                        <p class="text-muted" x-text="list.category"></p>
                        <div class="stats">
                            <span x-text="list.itemsCount + (list.itemsCount === 1 ? ' Eintrag' : ' Einträge')"></span>
                        </div>
                    </div>
                </a>
            </template>
            
            <!-- Empty search results state -->
            <div x-show="filteredLists.length === 0" class="empty-state glass card" style="grid-column: 1 / -1; text-align: center; padding: var(--spacing-lg);">
                <p>Keine Buckets gefunden, die zu deiner Suche passen.</p>
            </div>
        {% endif %}
    </div>

    <!-- Create Bucket Modal -->
    <template x-if="showCreateModal">
        <div class="modal-overlay" x-show="showCreateModal" style="display: none;">
            <div class="modal-content glass card">
                <h2>Neuen Bucket erstellen</h2>
                <form action="{% url 'core:list_create' %}" method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Name des Buckets</label>
                        <input type="text" name="title" placeholder="z.B. Wocheneinkauf" required class="glass">
                    </div>
                    
                    <div class="form-group">
                        <label style="display: flex; align-items: center; justify-content: space-between;">
                            <span>Vorlage auswählen</span>
                            <span class="text-muted" style="font-size: 0.75rem; font-weight: normal;">Klicke auf das ❓ einer Vorlage für Beispiele & Infos</span>
                        </label>
                        <div class="template-selector">
                            {% for cat in categories %}
                                <label class="template-option">
                                    <input type="radio" name="category_id" value="{{ cat.id }}" required>
                                    <div class="template-card glass" style="position: relative;">
                                        <!-- Help Button in Corner -->
                                        <button type="button" 
                                                @click.stop.prevent="helpTemplateSlug = '{{ cat.slug }}'; showTemplateHelp = true"
                                                class="glass" 
                                                style="position: absolute; top: 6px; right: 6px; border: none; background: rgba(255,255,255,0.08); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; cursor: pointer; color: var(--primary); transition: all 0.2s;"
                                                onmouseover="this.style.background='rgba(255,255,255,0.18)'"
                                                onmouseout="this.style.background='rgba(255,255,255,0.08)'"
                                                title="Vorlage-Anleitung anzeigen">
                                            ❓
                                        </button>
                                        <span class="template-icon">{{ cat.icon }}</span>
                                        <span class="template-name">{{ cat.name }}</span>
                                    </div>
                                </label>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn glass" @click="showCreateModal = false">Abbrechen</button>
                        <button type="submit" class="btn btn-primary">Erstellen</button>
                    </div>
                </form>
            </div>
        </div>
    </template>

    <!-- Help / Template Instructions Modal -->
    <template x-if="showTemplateHelp">
        <div class="modal-overlay" @click.self="showTemplateHelp = false" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: flex-start; justify-content: center; z-index: 2200; backdrop-filter: blur(10px); overflow-y: auto; padding: var(--spacing-md);">
            <div class="modal-content glass card" style="width: 100%; max-width: 550px; padding: var(--spacing-lg); border: 1px solid var(--accent); display: flex; flex-direction: column; gap: var(--spacing-md); position: relative; margin: auto;">
                
                <!-- Close Button -->
                <button type="button" @click="showTemplateHelp = false" style="position: absolute; top: 16px; right: 16px; background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; line-height: 1;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">&times;</button>
                
                <!-- Dynamic Header and Content based on selected slug -->
                <template x-if="helpTemplates[helpTemplateSlug]">
                    <div>
                        <div style="display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; margin-bottom: var(--spacing-md);">
                            <span style="font-size: 2.2rem;" x-text="helpTemplates[helpTemplateSlug].icon"></span>
                            <div>
                                <h2 style="margin: 0; font-size: 1.3rem; color: var(--primary);">
                                    Vorlage: <span x-text="helpTemplates[helpTemplateSlug].name"></span>
                                </h2>
                                <p class="text-muted" style="margin: 2px 0 0 0; font-size: 0.82rem;">Bucket-Vorlage Details & Ausfüllhilfen</p>
                            </div>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 14px; line-height: 1.5; font-size: 0.92rem;">
                            <!-- Purpose -->
                            <p>
                                <strong>💡 Zweck:</strong> 
                                <span x-text="helpTemplates[helpTemplateSlug].purpose || 'Einträge übersichtlich erfassen und verwalten.'"></span>
                            </p>
                            
                            <!-- Fields -->
                            <template x-if="helpTemplates[helpTemplateSlug].fields">
                                <div>
                                    <strong>🛠️ Erstellung & Felder:</strong>
                                    <div style="white-space: pre-line; margin-top: 4px;" x-text="helpTemplates[helpTemplateSlug].fields"></div>
                                </div>
                            </template>
                            
                            <!-- Example -->
                            <template x-if="helpTemplates[helpTemplateSlug].example">
                                <div style="background: rgba(255,255,255,0.02); padding: 12px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.05); margin-top: 8px;">
                                    <strong style="color: var(--primary);">📝 Praxis-Beispiel:</strong><br>
                                    <span style="font-style: italic; white-space: pre-line;" x-text="helpTemplates[helpTemplateSlug].example"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <div style="margin-top: var(--spacing-md); display: flex; justify-content: flex-end;">
                    <button type="button" class="btn btn-primary" @click="showTemplateHelp = false" style="min-width: 100px;">Verstanden</button>
                </div>
            </div>
        </div>
    </template>
    
    <!-- Dashboard Help Modal -->
    <template x-if="showHelpModal">
        <div class="modal-overlay" @click.self="showHelpModal = false" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2100; backdrop-filter: blur(10px);">
            <div class="modal-content glass card" style="width: 100%; max-width: 500px; padding: var(--spacing-lg); border: 1px solid var(--accent); position: relative; max-height: 90vh; overflow-y: auto;">
                <button type="button" @click="showHelpModal = false" style="position: absolute; top: 16px; right: 16px; background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; line-height: 1;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">&times;</button>
                
                <h2 style="margin: 0 0 var(--spacing-md) 0; font-size: 1.4rem; color: var(--primary); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; align-items: center; gap: 8px;">
                    <span>📂 Dein Cockpit Dashboard</span>
                </h2>
                
                <div style="display: flex; flex-direction: column; gap: var(--spacing-md); line-height: 1.6; font-size: 0.95rem;">
                    <p>
                        Hier verwaltest du all deine aktiven <strong>Buckets</strong> an einem zentralen Ort.
                    </p>
                    <div>
                        <strong style="color: var(--accent);">➕ Neuen Bucket anlegen:</strong>
                        <p style="margin: 4px 0 0 0;">
                            Nutze den <strong>"+ Neuer Bucket"</strong> Button, um eine neue Liste zu starten. Jede Vorlage ist speziell für ihren Zweck optimiert.
                        </p>
                    </div>
                    <div>
                        <strong style="color: var(--accent);">⚙️ Funktionen der Vorlagen:</strong>
                        <ul style="margin: 4px 0 0 0; padding-left: 20px;">
                            <li><strong>Trainingspläne:</strong> Tracke Workouts, Runden, Gewichte und grafische Statistiken.</li>
                            <li><strong>Veranstaltungsplaner:</strong> Plane Partys, lade Gäste ein und teile Aufgaben ("Wer bringt was mit").</li>
                            <li><strong>Wunsch- & Geschenkeliste:</strong> Perfekt zum Wichteln (Secret Santa), schützt Geschenke vor neugierigen Augen.</li>
                        </ul>
                    </div>
                    <div>
                        <strong style="color: var(--accent);">🔄 PWA-Tipps:</strong>
                        <p style="margin: 4px 0 0 0;">
                            Nutze das 🔄 Pfeil-Icon oben rechts, um die App im Vollbildmodus blitzschnell zu aktualisieren. Der ⬅️ Pfeil führt dich jederzeit einen Schritt zurück.
                        </p>
                    </div>
                </div>
                
                <div style="margin-top: var(--spacing-lg); display: flex; justify-content: flex-end;">
                    <button type="button" class="btn btn-primary" @click="showHelpModal = false" style="min-width: 100px;">Verstanden</button>
                </div>
            </div>
        </div>
    </template>
</div>

<style>
    .header-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--spacing-lg);
    }
    .list-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: var(--spacing-md);
    }
    .bucket-card {
        text-decoration: none;
        transition: transform 0.2s;
    }
    .bucket-card:hover {
        transform: translateY(-5px);
        border-color: var(--primary);
        text-decoration: none;
    }
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
        overflow-y: auto;
        padding: var(--spacing-md);
    }
    .modal-content {
        width: 100%;
        max-width: 500px;
        padding: var(--spacing-lg);
        margin: auto;
    }
    .template-selector {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: var(--spacing-sm);
        margin-top: var(--spacing-sm);
    }
    .template-option input { display: none; }
    .template-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: var(--spacing-sm);
        cursor: pointer;
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-md);
        min-height: 120px; /* Erhöht für bessere Lesbarkeit */
        text-align: center;
        transition: all 0.2s;
    }
    .template-icon {
        font-size: 1.8rem;
        margin-bottom: 4px;
    }
    .template-name {
        font-size: 0.75rem;
        font-weight: 500;
        line-height: 1.2;
    }
    .template-option input:checked + .template-card {
        border-color: var(--primary);
        background: color-mix(in srgb, var(--primary) 20%, transparent);
        transform: scale(1.05);
        box-shadow: 0 0 15px color-mix(in srgb, var(--primary) 30%, transparent);
    }
    .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: var(--spacing-md);
        margin-top: var(--spacing-lg);
    }
    
    @media (max-width: 768px) {
        .header-section {
            flex-direction: column;
            align-items: stretch;
            gap: var(--spacing-md);
        }
        .header-section > div {
            text-align: center;
        }
        .header-section button {
            width: 100%;
        }
        .list-grid {
            grid-template-columns: 1fr;
        }
        .modal-content {
            padding: var(--spacing-md);
            margin: var(--spacing-md);
            width: auto;
        }
    }
</style>
{% endblock %}
