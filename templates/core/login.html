{% extends 'base.html' %}

{% block content %}
<div class="card glass" style="max-width: 400px; margin: 40px auto; padding: var(--spacing-lg); text-align: center;">
    <div style="font-size: 3rem; margin-bottom: var(--spacing-sm);">🔐</div>
    <h2 style="margin-bottom: var(--spacing-md);">Anmelden</h2>
    <p class="text-muted" style="margin-bottom: var(--spacing-lg);">Willkommen zurück bei Buckezz</p>

    {% if form.errors %}
        <div style="background: rgba(255, 0, 0, 0.1); color: #ff6b6b; padding: var(--spacing-sm); border-radius: var(--radius-sm); margin-bottom: var(--spacing-md); border: 1px solid rgba(255, 0, 0, 0.2);">
            Dein Benutzername oder Passwort ist falsch. Bitte versuche es erneut.
        </div>
    {% endif %}

    <form method="POST" action="{% url 'core:login' %}">
        {% csrf_token %}
        <div style="margin-bottom: var(--spacing-md); text-align: left;">
            <label for="id_username" style="display: block; margin-bottom: 4px; font-weight: 500; font-size: 0.9rem;">Benutzername</label>
            <input type="text" name="username" id="id_username" class="glass" required style="width: 100%; padding: 12px; font-size: 1rem;">
        </div>
        
        <div style="margin-bottom: var(--spacing-lg); text-align: left;">
            <label for="id_password" style="display: block; margin-bottom: 4px; font-weight: 500; font-size: 0.9rem;">Passwort</label>
            <input type="password" name="password" id="id_password" class="glass" required style="width: 100%; padding: 12px; font-size: 1rem;">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 1.1rem; justify-content: center;">Einloggen</button>
        <input type="hidden" name="next" value="{{ next|default:'' }}">
    </form>
</div>
{% endblock %}
